<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QFund - Gerador de Atividades</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        .conteudos-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .conteudos-scroll::-webkit-scrollbar-track {
            background: #f8fafc; 
            border-radius: 4px;
        }
        .conteudos-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .conteudos-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased h-screen flex flex-col overflow-hidden">

    <header class="bg-[#0052cc] text-white h-16 flex items-center justify-between px-6 shadow-md z-20 shrink-0">
        <div class="flex items-center gap-4">
            <div class="text-2xl font-bold tracking-wide flex items-center gap-2">
                <i class="fas fa-layer-group"></i> QFund
            </div>
        </div>
        <div class="flex items-center gap-3 bg-white/10 px-4 py-1.5 rounded-full border border-white/20 cursor-pointer hover:bg-white/20 transition-colors">
            <div class="w-8 h-8 rounded-full bg-white text-[#0052cc] flex items-center justify-center font-bold text-sm shadow-sm">
                M
            </div>
            <span class="text-sm font-medium">Matheus</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col shrink-0 overflow-y-auto shadow-[4px_0_10px_rgba(0,0,0,0.02)]">
            <div class="p-5 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                Menu
            </div>
                
                <li>
                    <a href="#atividadeForm" id="menuGerar" class="flex items-center gap-3 px-3 py-3 rounded-lg bg-blue-50 text-blue-600 font-medium transition-colors border-l-4 border-blue-600">
                        <i class="fas fa-file-alt w-5 text-center"></i> Gerar Atividades
                    </a>
                </li>

                <li>
                    <a href="history.html" id="menuHistorico" class="flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-gray-50 text-gray-700 font-medium transition-colors">
                        <i class="fas fa-history w-5 text-center"></i> Histórico
                    </a>
                </li>

            </ul>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-5xl mx-auto">
                
                <div class="mb-6">
                    <h1 class="text-2xl font-bold text-gray-900">Gerador de Atividades</h1>
                    <p class="text-sm text-gray-500 mt-1">Gere atividades automaticamente utilizando o banco de questões.</p>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8">
                    <h2 class="text-lg font-semibold text-gray-800 border-b border-gray-100 pb-4 mb-6">Cadastrar Atividade</h2>
                    
                    <form id="atividadeForm" class="space-y-6">
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            
                            <div class="form-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Disciplina <span class="text-red-500">*</span></label>
                                <select id="disciplina" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                                    <option value="">Carregando...</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de usuário</label>
                                <select id="tipo_usuario" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                                    <option value="">Selecione...</option>
                                    <option value="professor">Professor</option>
                                    <option value="usuario">Usuário</option>
                                </select>
                            </div>

                            <div id="professorField" class="form-group hidden">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Professor responsável</label>
                                <input type="text" id="professor" placeholder="Nome do professor" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                            </div>

                            <div class="form-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Quantidade <span class="text-red-500">*</span></label>
                                <input type="number" id="quantidade" value="10" min="1" max="50" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                            </div>

                            <div class="form-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Dificuldade</label>
                                <select id="dificuldade" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                                    <option value="">Todas</option>
                                    <option value="Fácil">Fácil</option>
                                    <option value="Médio">Médio</option>
                                    <option value="Difícil">Difícil</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                                <select id="tipo" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                                    <option value="">Todos</option>
                                    <option value="objetiva">Objetiva</option>
                                    <option value="discursiva">Discursiva</option>
                                </select>
                            </div>

                            <div class="form-group md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
                                <input type="text" id="titulo" value="Atividade" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                            </div>

                            <div class="form-group md:col-span-3">
                                <div class="flex flex-col gap-3">
                                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700">Conteúdos</label>
                                            <p id="conteudosResumo" class="text-xs text-gray-500 mt-1">Selecione uma disciplina para carregar os conteúdos.</p>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <button type="button" id="selecionarTodosConteudos" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg border border-gray-300 bg-white text-gray-700 text-sm font-medium hover:bg-gray-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                                <i class="fas fa-check-double text-blue-600"></i>
                                                Todos
                                            </button>
                                            <button type="button" id="limparConteudos" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg border border-gray-300 bg-white text-gray-700 text-sm font-medium hover:bg-gray-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                                <i class="fas fa-eraser text-gray-500"></i>
                                                Limpar
                                            </button>
                                        </div>
                                    </div>

                                    <div class="relative">
                                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                        <input type="search" id="buscarConteudo" placeholder="Buscar conteúdo..." class="w-full border border-gray-300 rounded-lg pl-9 pr-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm disabled:bg-gray-100 disabled:cursor-not-allowed" disabled>
                                    </div>

                                    <select id="conteudos" multiple class="hidden"></select>

                                    <div id="conteudosLista" class="conteudos-scroll min-h-[150px] max-h-[280px] overflow-y-auto rounded-lg border border-gray-200 bg-gray-50 p-3">
                                        <div class="h-[126px] flex items-center justify-center text-sm text-gray-500">
                                            <span>Os conteúdos aparecerão aqui.</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center">
                            <input type="checkbox" id="gabarito" class="w-5 h-5 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer">
                            <label for="gabarito" class="ml-3 text-sm font-medium text-gray-700 cursor-pointer">Incluir gabarito no final do documento</label>
                        </div>

                        <div class="pt-6 border-t border-gray-100 mt-6 flex flex-col items-end">
                            <div class="flex gap-3">
                                <button type="submit" class="w-full md:w-auto md:min-w-[220px] bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 px-6 rounded-lg shadow-sm transition-colors flex justify-center items-center gap-2 text-[15px]">
                                    <i class="fas fa-file-pdf"></i> GERAR PDF
                                </button>
                            </div>
                        </div>

                        <div id="status" class="hidden mt-4 text-center text-sm font-semibold rounded-lg p-3"></div>

                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = "http://127.0.0.1:8000";

        const CACHE_KEY = 'disciplinas_cache';
        const CACHE_TTL = 1000 * 60 * 60; // 1 hora em ms

        const disciplinaSelect = document.getElementById("disciplina");
        const conteudosSelect = document.getElementById("conteudos");
        const conteudosLista = document.getElementById("conteudosLista");
        const conteudosResumo = document.getElementById("conteudosResumo");
        const buscarConteudo = document.getElementById("buscarConteudo");
        const selecionarTodosConteudos = document.getElementById("selecionarTodosConteudos");
        const limparConteudos = document.getElementById("limparConteudos");
        const form = document.getElementById("atividadeForm");
        const statusDiv = document.getElementById("status");
        let conteudosDisponiveis = [];
        let conteudosArvore = [];
        let conteudosSelecionados = new Set();
        let conteudosExpandidos = new Set();

        // Função para atualizar as classes do Status Div (Tailwind)
        function setStatus(mensagem, tipo) {
            statusDiv.classList.remove("hidden", "bg-blue-50", "text-blue-700", "bg-red-50", "text-red-700", "bg-green-50", "text-green-700");
            
            if (tipo === "loading") statusDiv.classList.add("bg-blue-50", "text-blue-700");
            else if (tipo === "error") statusDiv.classList.add("bg-red-50", "text-red-700");
            else if (tipo === "success") statusDiv.classList.add("bg-green-50", "text-green-700");
            
            statusDiv.innerHTML = mensagem;
        }

        async function carregarDisciplinas() {
            try {
                // tenta cache local primeiro
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const parsed = JSON.parse(cached);
                    if (Date.now() - parsed.ts < CACHE_TTL) {
                        preencherDisciplinas(parsed.data);
                        return;
                    }
                }

                const response = await fetch(`${API}/disciplinas`);
                const data = await response.json();

                const disciplinas = data.data || data;

                // salvar no cache local
                try {
                    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: disciplinas }));
                } catch (e) {
                    // falha no storage não é crítico
                }

                preencherDisciplinas(disciplinas);
            } catch (erro) {
                console.error(erro);
                setStatus('<i class="fas fa-exclamation-circle"></i> Erro ao carregar disciplinas.', 'error');
            }
        }

        function preencherDisciplinas(disciplinas) {
            disciplinaSelect.innerHTML = '<option value="">Selecione...</option>';
            disciplinas.forEach(disciplina => {
                disciplinaSelect.innerHTML += `
                    <option value="${disciplina.id}">
                        ${disciplina.name}
                    </option>
                `;
            });
        }

        function escapeHtml(texto) {
            return String(texto)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function normalizarConteudos(conteudos, nivel = 0, caminho = []) {
            const lista = [];
            const arvore = [];

            conteudos.forEach((conteudo) => {
                const nome = conteudo.name || conteudo.nome || "Conteúdo sem nome";
                const filhos = conteudo.subitens || conteudo.children || [];
                const item = {
                    id: String(conteudo.id),
                    nome,
                    grupo: caminho[caminho.length - 1] || "",
                    caminho: [...caminho, nome].join(" > "),
                    nivel,
                    filhos: [],
                    descendentes: []
                };

                if (Array.isArray(filhos) && filhos.length) {
                    const filhosNormalizados = normalizarConteudos(filhos, nivel + 1, [...caminho, nome]);
                    item.filhos = filhosNormalizados.arvore;
                    item.descendentes = filhosNormalizados.lista.map((filho) => filho.id);
                    lista.push(item, ...filhosNormalizados.lista);
                } else {
                    lista.push(item);
                }

                arvore.push(item);
            });

            return { lista, arvore };
        }

        function atualizarSelectConteudos() {
            conteudosSelect.innerHTML = "";

            conteudosDisponiveis.forEach((conteudo) => {
                const option = document.createElement("option");
                option.value = conteudo.id;
                option.textContent = conteudo.nome;
                option.selected = conteudosSelecionados.has(conteudo.id);
                conteudosSelect.appendChild(option);
            });
        }

        function atualizarResumoConteudos(totalVisivel = conteudosDisponiveis.length) {
            const selecionados = conteudosSelecionados.size;

            if (!conteudosDisponiveis.length) {
                conteudosResumo.textContent = disciplinaSelect.value
                    ? "Não achei conteúdos para essa matéria."
                    : "Escolha uma matéria para eu mostrar os conteúdos.";
                return;
            }

            const pluralEncontrados = totalVisivel === 1 ? "conteúdo" : "conteúdos";

            if (selecionados) {
                const pluralMarcados = selecionados === 1 ? "conteúdo marcado" : "conteúdos marcados";
                conteudosResumo.textContent = `${selecionados} ${pluralMarcados}. Estou mostrando ${totalVisivel} ${pluralEncontrados}.`;
                return;
            }

            conteudosResumo.textContent = `Encontrei ${totalVisivel} ${pluralEncontrados}. Marque os que entram na atividade.`;
        }

        function renderizarConteudos() {
            const termo = (buscarConteudo.value || "").trim().toLowerCase();
            const filtrados = conteudosDisponiveis.filter((conteudo) => {
                const texto = `${conteudo.nome} ${conteudo.grupo} ${conteudo.caminho}`.toLowerCase();
                return texto.includes(termo);
            });

            conteudosLista.innerHTML = "";

            if (!conteudosDisponiveis.length) {
                conteudosLista.innerHTML = `
                    <div class="h-[126px] flex items-center justify-center text-sm text-gray-500">
                        <span>Os conteúdos aparecerão aqui.</span>
                    </div>
                `;
                atualizarResumoConteudos(0);
                return;
            }

            if (!filtrados.length) {
                conteudosLista.innerHTML = `
                    <div class="h-[126px] flex items-center justify-center text-sm text-gray-500">
                        <span>Nenhum conteúdo encontrado.</span>
                    </div>
                `;
                atualizarResumoConteudos(0);
                return;
            }

            const container = document.createElement("div");
            container.className = termo
                ? "grid grid-cols-1 md:grid-cols-2 gap-2"
                : "space-y-1";

            const criarItem = (conteudo, modoBusca = false) => {
                const selecionado = conteudosSelecionados.has(conteudo.id);
                const temFilhos = conteudo.filhos && conteudo.filhos.length;
                const expandido = conteudosExpandidos.has(conteudo.id);
                const button = document.createElement("button");
                button.type = "button";
                button.dataset.id = conteudo.id;
                button.style.marginLeft = modoBusca ? "0" : `${conteudo.nivel * 18}px`;
                button.className = [
                    "w-full text-left rounded-lg border p-3 transition-all min-h-[58px]",
                    "focus:outline-none focus:ring-2 focus:ring-blue-500",
                    selecionado
                        ? "border-blue-500 bg-blue-50 shadow-sm"
                        : "border-gray-200 bg-white hover:border-blue-300 hover:bg-white"
                ].join(" ");

                button.innerHTML = `
                    <div class="flex items-start gap-3">
                        <span class="expand-control w-5 shrink-0 text-gray-500">
                            ${temFilhos && !modoBusca ? `<i class="fas ${expandido ? "fa-chevron-down" : "fa-chevron-right"} text-[11px]"></i>` : ""}
                        </span>
                        <span class="mt-0.5 w-5 h-5 rounded-md border flex items-center justify-center shrink-0 ${selecionado ? "bg-blue-600 border-blue-600 text-white" : "bg-white border-gray-300 text-transparent"}">
                            <i class="fas fa-check text-[11px]"></i>
                        </span>
                        <span class="min-w-0">
                            <span class="block text-sm font-semibold ${selecionado ? "text-blue-800" : "text-gray-800"}">${escapeHtml(conteudo.nome)}</span>
                            ${conteudo.grupo ? `<span class="block text-xs text-gray-500 mt-1">${escapeHtml(modoBusca ? conteudo.caminho : conteudo.grupo)}</span>` : ""}
                        </span>
                    </div>
                `;

                button.addEventListener("click", (event) => {
                    if (temFilhos && !modoBusca && event.target.closest(".expand-control")) {
                        if (conteudosExpandidos.has(conteudo.id)) {
                            conteudosExpandidos.delete(conteudo.id);
                        } else {
                            conteudosExpandidos.add(conteudo.id);
                        }
                    } else {
                        alternarConteudo(conteudo);
                    }

                    atualizarSelectConteudos();
                    renderizarConteudos();
                });

                container.appendChild(button);
            };

            const renderizarNo = (conteudo) => {
                criarItem(conteudo, false);
                if (conteudosExpandidos.has(conteudo.id)) {
                    conteudo.filhos.forEach(renderizarNo);
                }
            };

            if (termo) {
                filtrados.forEach((conteudo) => criarItem(conteudo, true));
            } else {
                conteudosArvore.forEach(renderizarNo);
            }

            conteudosLista.appendChild(container);
            atualizarResumoConteudos(filtrados.length);
        }

        function alternarConteudo(conteudo) {
            const ids = [conteudo.id, ...(conteudo.descendentes || [])];
            const deveSelecionar = !ids.every((id) => conteudosSelecionados.has(id));

            ids.forEach((id) => {
                if (deveSelecionar) {
                    conteudosSelecionados.add(id);
                } else {
                    conteudosSelecionados.delete(id);
                }
            });

            if (deveSelecionar && conteudo.filhos && conteudo.filhos.length) {
                conteudosExpandidos.add(conteudo.id);
            }
        }

        function setConteudosHabilitados(habilitado) {
            buscarConteudo.disabled = !habilitado;
            selecionarTodosConteudos.disabled = !habilitado;
            limparConteudos.disabled = !habilitado;
        }

        async function carregarConteudos(disciplinaId) {
            conteudosSelect.innerHTML = "";
            conteudosDisponiveis = [];
            conteudosArvore = [];
            conteudosSelecionados = new Set();
            conteudosExpandidos = new Set();
            buscarConteudo.value = "";
            setConteudosHabilitados(false);
            renderizarConteudos();

            if (!disciplinaId) return;

            try {
                conteudosLista.innerHTML = `
                    <div class="h-[126px] flex items-center justify-center text-sm text-blue-700">
                        <i class="fas fa-spinner fa-spin mr-2"></i>
                        <span>Carregando conteúdos...</span>
                    </div>
                `;

                const response = await fetch(`${API}/conteudos/${disciplinaId}`);
                const conteudos = await response.json();

                const conteudosNormalizados = normalizarConteudos(Array.isArray(conteudos) ? conteudos : []);
                conteudosDisponiveis = conteudosNormalizados.lista;
                conteudosArvore = conteudosNormalizados.arvore;
                setConteudosHabilitados(conteudosDisponiveis.length > 0);
                atualizarSelectConteudos();
                renderizarConteudos();
            } catch (erro) {
                console.error(erro);
                setStatus('<i class="fas fa-exclamation-circle"></i> Erro ao carregar conteúdos.', 'error');
            }
        }

        disciplinaSelect.addEventListener("change", () => carregarConteudos(disciplinaSelect.value));

        buscarConteudo.addEventListener("input", renderizarConteudos);

        selecionarTodosConteudos.addEventListener("click", () => {
            const termo = (buscarConteudo.value || "").trim().toLowerCase();
            conteudosDisponiveis
                .filter((conteudo) => `${conteudo.nome} ${conteudo.grupo} ${conteudo.caminho}`.toLowerCase().includes(termo))
                .forEach((conteudo) => conteudosSelecionados.add(conteudo.id));

            atualizarSelectConteudos();
            renderizarConteudos();
        });

        limparConteudos.addEventListener("click", () => {
            conteudosSelecionados = new Set();
            atualizarSelectConteudos();
            renderizarConteudos();
        });

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            setStatus('<i class="fas fa-spinner fa-spin mr-2"></i> Gerando atividade...', 'loading');

            try {
                const conteudosSelecionadosPayload = Array.from(conteudosSelecionados);

                const body = {
                    disciplina_id: disciplinaSelect.value,
                    conteudos: conteudosSelecionadosPayload,
                    quantidade: Number(document.getElementById("quantidade").value),
                    dificuldade: document.getElementById("dificuldade").value || null,
                    tipo: document.getElementById("tipo").value || null,
                    incluir_gabarito: document.getElementById("gabarito").checked,
                    titulo: document.getElementById("titulo").value
                };
                // incluir tipo de usuário e professor responsável se aplicável
                const tipoVal = (document.getElementById("tipo_usuario").value) || null;
                if (tipoVal) body.tipo_usuario = tipoVal;
                if (tipoVal === 'professor') {
                    body.professor = document.getElementById('professor').value || null;
                }

                const response = await fetch(`${API}/gerar-atividade`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                if (!response.ok) {
                    const erro = await response.text();
                    throw new Error(erro);
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement("a");

                link.href = url;
                link.download = "atividade.pdf";
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);

                setStatus('<i class="fas fa-check-circle mr-2"></i> PDF gerado com sucesso!', 'success');
                
                // Remove o aviso de sucesso após 5 segundos
                setTimeout(() => { statusDiv.classList.add("hidden"); }, 5000);

            } catch (erro) {
                console.error(erro);
                setStatus('<i class="fas fa-times-circle mr-2"></i> Erro ao gerar atividade.', 'error');
            }
        });

        // carregar/salvar perfil do usuário e mostrar/ocultar campo professor
        const tipoSelect = document.getElementById('tipo_usuario');
        const professorField = document.getElementById('professorField');
        const professorInput = document.getElementById('professor');

        async function saveProfile() {
            const tipo = tipoSelect ? (tipoSelect.value || null) : null;
            const nome = (tipo === 'professor' && professorInput) ? (professorInput.value || null) : null;
            const disciplina_preferida = disciplinaSelect.value || null;
            const profile = { tipo: tipo || 'usuario', nome, disciplina_preferida };
            try {
                await fetch(`${API}/usuario`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(profile)
                });
            } catch (e) {
                console.error('Erro salvando perfil', e);
            }
        }

        async function loadProfile() {
            try {
                const res = await fetch(`${API}/usuario`);
                if (!res.ok) return;
                const profile = await res.json();
                if (!profile) return;

                if (profile.tipo && tipoSelect) tipoSelect.value = profile.tipo;
                if (profile.tipo === 'professor') {
                    if (professorInput) {
                        professorInput.value = profile.nome || '';
                        professorField.classList.remove('hidden');
                    }
                } else {
                    if (professorInput) professorInput.value = '';
                    if (professorField) professorField.classList.add('hidden');
                }

                if (profile.disciplina_preferida && disciplinaSelect) {
                    disciplinaSelect.value = profile.disciplina_preferida;
                    await carregarConteudos(profile.disciplina_preferida);
                }
            } catch (e) {
                console.error('Erro carregando perfil', e);
            }
        }

        if (tipoSelect) {
            tipoSelect.addEventListener('change', async (e) => {
                if (e.target.value === 'professor') {
                    professorField.classList.remove('hidden');
                } else {
                    professorField.classList.add('hidden');
                    if (professorInput) professorInput.value = '';
                }
                await saveProfile();
            });
        }

        if (professorInput) {
            professorInput.addEventListener('blur', saveProfile);
        }

        carregarDisciplinas().then(() => loadProfile()).catch(() => {});
    </script>
</body>
</html>
