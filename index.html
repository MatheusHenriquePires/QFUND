<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QFund - Gerador de Atividades</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Estilização da barra de rolagem para o select múltiplo */
        select[multiple]::-webkit-scrollbar {
            width: 8px;
        }
        select[multiple]::-webkit-scrollbar-track {
            background: #f8fafc; 
            border-radius: 4px;
        }
        select[multiple]::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        select[multiple]::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased h-screen flex flex-col overflow-hidden">

    <header class="bg-[#0052cc] text-white h-16 flex items-center justify-between px-6 shadow-md z-20 shrink-0">
        <div class="flex items-center gap-4">
            <div class="text-2xl font-bold tracking-wide flex items-center gap-2">
                <i class="fas fa-layer-group"></i> QFund
            </div>
        </div>
        <div class="flex items-center gap-3 bg-white/10 px-4 py-1.5 rounded-full border border-white/20 cursor-pointer hover:bg-white/20 transition-colors">
            <div class="w-8 h-8 rounded-full bg-white text-[#0052cc] flex items-center justify-center font-bold text-sm shadow-sm">
                M
            </div>
            <span class="text-sm font-medium">Matheus</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col shrink-0 overflow-y-auto shadow-[4px_0_10px_rgba(0,0,0,0.02)]">
            <div class="p-5 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                Menu
            </div>
                
                <li>
                    <a href="#atividadeForm" id="menuGerar" class="flex items-center gap-3 px-3 py-3 rounded-lg bg-blue-50 text-blue-600 font-medium transition-colors border-l-4 border-blue-600">
                        <i class="fas fa-file-alt w-5 text-center"></i> Gerar Atividades
                    </a>
                </li>

                <li>
                    <a href="history.html" id="menuHistorico" class="flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-gray-50 text-gray-700 font-medium transition-colors">
                        <i class="fas fa-history w-5 text-center"></i> Histórico
                    </a>
                </li>

            </ul>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-5xl mx-auto">
                
                <div class="mb-6">
                    <h1 class="text-2xl font-bold text-gray-900">Gerador de Atividades</h1>
                    <p class="text-sm text-gray-500 mt-1">Gere atividades automaticamente utilizando o banco de questões.</p>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8">
                    <h2 class="text-lg font-semibold text-gray-800 border-b border-gray-100 pb-4 mb-6">Cadastrar Atividade</h2>
                    
                    <form id="atividadeForm" class="space-y-6">
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            
                            <div class="form-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Disciplina <span class="text-red-500">*</span></label>
                                <select id="disciplina" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                                    <option value="">Carregando...</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de usuário</label>
                                <select id="tipo_usuario" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                                    <option value="">Selecione...</option>
                                    <option value="professor">Professor</option>
                                    <option value="usuario">Usuário</option>
                                </select>
                            </div>

                            <div id="professorField" class="form-group hidden">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Professor responsável</label>
                                <input type="text" id="professor" placeholder="Nome do professor" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                            </div>

                            <div class="form-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Quantidade <span class="text-red-500">*</span></label>
                                <input type="number" id="quantidade" value="10" min="1" max="50" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                            </div>

                            <div class="form-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Dificuldade</label>
                                <select id="dificuldade" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                                    <option value="">Todas</option>
                                    <option value="Fácil">Fácil</option>
                                    <option value="Médio">Médio</option>
                                    <option value="Difícil">Difícil</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                                <select id="tipo" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                                    <option value="">Todos</option>
                                    <option value="objetiva">Objetiva</option>
                                    <option value="discursiva">Discursiva</option>
                                </select>
                            </div>

                            <div class="form-group md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
                                <input type="text" id="titulo" value="Atividade" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                            </div>

                            <div class="form-group md:col-span-3">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Conteúdos</label>
                                <select id="conteudos" multiple style="height: 160px;" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                                    </select>
                                <p class="text-xs text-gray-500 mt-2"><i class="fas fa-info-circle mr-1"></i> Segure <strong>CTRL</strong> (ou <strong>CMD</strong>) para selecionar múltiplos conteúdos.</p>
                            </div>
                        </div>

                        <div class="flex items-center">
                            <input type="checkbox" id="gabarito" class="w-5 h-5 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer">
                            <label for="gabarito" class="ml-3 text-sm font-medium text-gray-700 cursor-pointer">Incluir gabarito no final do documento</label>
                        </div>

                        <div class="pt-6 border-t border-gray-100 mt-6 flex flex-col items-end">
                            <div class="flex gap-3">
                                <button type="submit" class="w-full md:w-auto md:min-w-[220px] bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 px-6 rounded-lg shadow-sm transition-colors flex justify-center items-center gap-2 text-[15px]">
                                    <i class="fas fa-file-pdf"></i> GERAR PDF
                                </button>
                            </div>
                        </div>

                        <div id="status" class="hidden mt-4 text-center text-sm font-semibold rounded-lg p-3"></div>

                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = "http://127.0.0.1:8000";

        const CACHE_KEY = 'disciplinas_cache';
        const CACHE_TTL = 1000 * 60 * 60; // 1 hora em ms

        const disciplinaSelect = document.getElementById("disciplina");
        const conteudosSelect = document.getElementById("conteudos");
        const form = document.getElementById("atividadeForm");
        const statusDiv = document.getElementById("status");

        // Função para atualizar as classes do Status Div (Tailwind)
        function setStatus(mensagem, tipo) {
            statusDiv.classList.remove("hidden", "bg-blue-50", "text-blue-700", "bg-red-50", "text-red-700", "bg-green-50", "text-green-700");
            
            if (tipo === "loading") statusDiv.classList.add("bg-blue-50", "text-blue-700");
            else if (tipo === "error") statusDiv.classList.add("bg-red-50", "text-red-700");
            else if (tipo === "success") statusDiv.classList.add("bg-green-50", "text-green-700");
            
            statusDiv.innerHTML = mensagem;
        }

        async function carregarDisciplinas() {
            try {
                // tenta cache local primeiro
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const parsed = JSON.parse(cached);
                    if (Date.now() - parsed.ts < CACHE_TTL) {
                        preencherDisciplinas(parsed.data);
                        return;
                    }
                }

                const response = await fetch(`${API}/disciplinas`);
                const data = await response.json();

                const disciplinas = data.data || data;

                // salvar no cache local
                try {
                    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: disciplinas }));
                } catch (e) {
                    // falha no storage não é crítico
                }

                preencherDisciplinas(disciplinas);
            } catch (erro) {
                console.error(erro);
                setStatus('<i class="fas fa-exclamation-circle"></i> Erro ao carregar disciplinas.', 'error');
            }
        }

        function preencherDisciplinas(disciplinas) {
            disciplinaSelect.innerHTML = '<option value="">Selecione...</option>';
            disciplinas.forEach(disciplina => {
                disciplinaSelect.innerHTML += `
                    <option value="${disciplina.id}">
                        ${disciplina.name}
                    </option>
                `;
            });
        }

        async function carregarConteudos(disciplinaId) {
            conteudosSelect.innerHTML = "";
            if (!disciplinaId) return;

            try {
                const response = await fetch(`${API}/conteudos/${disciplinaId}`);
                const conteudos = await response.json();

                conteudos.forEach(conteudo => {
                    conteudosSelect.innerHTML += `
                        <option value="${conteudo.id}" class="p-2 border-b border-gray-100 cursor-pointer">
                            ${conteudo.name}
                        </option>
                    `;
                });
            } catch (erro) {
                console.error(erro);
                setStatus('<i class="fas fa-exclamation-circle"></i> Erro ao carregar conteúdos.', 'error');
            }
        }

        disciplinaSelect.addEventListener("change", () => carregarConteudos(disciplinaSelect.value));

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            setStatus('<i class="fas fa-spinner fa-spin mr-2"></i> Gerando atividade...', 'loading');

            try {
                const conteudosSelecionados = Array.from(conteudosSelect.selectedOptions).map(opcao => opcao.value);

                const body = {
                    disciplina_id: disciplinaSelect.value,
                    conteudos: conteudosSelecionados,
                    quantidade: Number(document.getElementById("quantidade").value),
                    dificuldade: document.getElementById("dificuldade").value || null,
                    tipo: document.getElementById("tipo").value || null,
                    incluir_gabarito: document.getElementById("gabarito").checked,
                    titulo: document.getElementById("titulo").value
                };
                // incluir tipo de usuário e professor responsável se aplicável
                const tipoVal = (document.getElementById("tipo_usuario").value) || null;
                if (tipoVal) body.tipo_usuario = tipoVal;
                if (tipoVal === 'professor') {
                    body.professor = document.getElementById('professor').value || null;
                }

                const response = await fetch(`${API}/gerar-atividade`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                if (!response.ok) {
                    const erro = await response.text();
                    throw new Error(erro);
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement("a");

                link.href = url;
                link.download = "atividade.pdf";
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);

                setStatus('<i class="fas fa-check-circle mr-2"></i> PDF gerado com sucesso!', 'success');
                
                // Remove o aviso de sucesso após 5 segundos
                setTimeout(() => { statusDiv.classList.add("hidden"); }, 5000);

            } catch (erro) {
                console.error(erro);
                setStatus('<i class="fas fa-times-circle mr-2"></i> Erro ao gerar atividade.', 'error');
            }
        });

        // carregar/salvar perfil do usuário e mostrar/ocultar campo professor
        const tipoSelect = document.getElementById('tipo_usuario');
        const professorField = document.getElementById('professorField');
        const professorInput = document.getElementById('professor');

        async function saveProfile() {
            const tipo = tipoSelect ? (tipoSelect.value || null) : null;
            const nome = (tipo === 'professor' && professorInput) ? (professorInput.value || null) : null;
            const disciplina_preferida = disciplinaSelect.value || null;
            const profile = { tipo: tipo || 'usuario', nome, disciplina_preferida };
            try {
                await fetch(`${API}/usuario`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(profile)
                });
            } catch (e) {
                console.error('Erro salvando perfil', e);
            }
        }

        async function loadProfile() {
            try {
                const res = await fetch(`${API}/usuario`);
                if (!res.ok) return;
                const profile = await res.json();
                if (!profile) return;

                if (profile.tipo && tipoSelect) tipoSelect.value = profile.tipo;
                if (profile.tipo === 'professor') {
                    if (professorInput) {
                        professorInput.value = profile.nome || '';
                        professorField.classList.remove('hidden');
                    }
                } else {
                    if (professorInput) professorInput.value = '';
                    if (professorField) professorField.classList.add('hidden');
                }

                if (profile.disciplina_preferida && disciplinaSelect) {
                    disciplinaSelect.value = profile.disciplina_preferida;
                    await carregarConteudos(profile.disciplina_preferida);
                }
            } catch (e) {
                console.error('Erro carregando perfil', e);
            }
        }

        if (tipoSelect) {
            tipoSelect.addEventListener('change', async (e) => {
                if (e.target.value === 'professor') {
                    professorField.classList.remove('hidden');
                } else {
                    professorField.classList.add('hidden');
                    if (professorInput) professorInput.value = '';
                }
                await saveProfile();
            });
        }

        if (professorInput) {
            professorInput.addEventListener('blur', saveProfile);
        }

        carregarDisciplinas().then(() => loadProfile()).catch(() => {});
    </script>
</body>
</html>
